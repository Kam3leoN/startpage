<!doctype html>
<html lang="fr" class="boot-pending">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#6750A4" />
    <link rel="icon" href="./icons/google.svg" />
    <script src="./boot-critical.js"></script>
    <link rel="preload" href="./k3ui/k3ui.min.css" as="style" />
    <link rel="modulepreload" href="./k3ui/k3ui.min.js" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <title>Page de démarrage</title>
    <style id="boot-critical">
      html.boot-pending,
      html.boot-pending body {
        background: var(--md-sys-color-surface, #fffbfe);
        color: var(--md-sys-color-on-surface, #1c1b1f);
      }

      body.boot-active {
        overflow: hidden;
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 2rem;
        background: var(--md-sys-color-surface, #fffbfe);
        color: var(--md-sys-color-on-surface, #1c1b1f);
      }

      #boot-splash.boot-screen--exit {
        animation: boot-screen-fade-out 480ms ease forwards;
      }

      @keyframes boot-screen-fade-out {
        from {
          opacity: 1;
        }
        to {
          opacity: 0;
          visibility: hidden;
        }
      }

      #boot-splash .boot-screen__brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25rem;
      }

      #boot-splash .boot-screen__brand-dot {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          var(--md-sys-color-primary, #6750a4) 0%,
          var(--md-sys-color-primary-container, #eaddff) 55%,
          var(--md-sys-color-tertiary-container, #ffd8e4) 100%
        );
        box-shadow:
          0 0 0 1px color-mix(in srgb, var(--md-sys-color-outline-variant, #cac4d0) 55%, transparent),
          0 12px 40px color-mix(in srgb, var(--md-sys-color-primary, #6750a4) 38%, transparent);
      }

      #boot-splash .boot-screen__brand-name {
        font-family: system-ui, sans-serif;
        font-size: 1.75rem;
        font-weight: 400;
        letter-spacing: 0.06em;
        color: var(--md-sys-color-on-surface, #1c1b1f);
      }

      #boot-splash .boot-screen__progress {
        border-radius: 50px;
        height: 4px;
        width: 150px;
        overflow: hidden;
        background: var(--md-sys-color-surface-container-high, #ece6f0);
        box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--md-sys-color-outline-variant, #cac4d0) 45%, transparent);
      }

      #boot-splash .boot-screen__indicator {
        width: 100%;
        height: 100%;
        border-radius: inherit;
        background: var(--md-sys-color-primary, #6750a4);
        transform: translateX(-100%);
        animation: boot-indicator-fill 3s cubic-bezier(0.83, 0, 0.17, 1) forwards;
      }

      @keyframes boot-indicator-fill {
        from {
          transform: translateX(-100%);
        }
        to {
          transform: translateX(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #boot-splash .boot-screen__indicator {
          animation: none;
          transform: translateX(0);
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-hidden="true">
      <div class="boot-screen__brand">
        <span class="boot-screen__brand-dot" aria-hidden="true"></span>
        <span class="boot-screen__brand-name">StartPage</span>
      </div>
      <div class="boot-screen__progress">
        <div class="boot-screen__indicator"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
